# Render Blueprint. Place at the repo root (or backend root if deploying that
# subdir). Provisions a PostgreSQL database + one Django web service, and wires
# DATABASE_URL from the database into the service automatically.
databases:
  - name: lms-db
    plan: free
    databaseName: lms
    user: lms

services:
  - type: web
    name: lms-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString   # Render injects the Postgres URL
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.4"
      # Set these in the Render dashboard after the first deploy:
      # DJANGO_ALLOWED_HOSTS   -> your-service.onrender.com
      # CORS_ALLOWED_ORIGINS   -> https://your-frontend.vercel.app
      # CSRF_TRUSTED_ORIGINS   -> https://your-frontend.vercel.app
